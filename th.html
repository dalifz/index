<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBPC-TH · Cabal Dashboard</title>
  <link rel="icon" href="logo_CBPC_TH.png">
  <link rel="stylesheet" href="styles.css?v=22">
</head>
<body data-theme="th">
  <button id="showSide" title="แสดงเมนู">☰</button>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="logo_CBPC_TH.png" alt="CABAL CBPC-TH">
        <div class="sub">CBPC-TH</div>
      </div>

      <div class="nav-section">Servers</div>
      <nav class="nav">
        <a href="th.html" class="active"><span class="dot"></span> CBPC-TH</a>
        <a href="sea.html"><span class="dot"></span> CBPC-SEA</a>
      </nav>

      <div class="nav-section">Metrics</div>
      <nav class="nav">
        <a href="th.html" class="active">Overview</a>
        <a href="detail.html?p=CBPC-TH&g=dauccu">DAU / CCU Trend</a>
        <a href="detail.html?p=CBPC-TH&g=alzfg">ALZ / FG</a>
        <a href="detail.html?p=CBPC-TH&g=revenue">Revenue</a>
        <a href="source.html?p=CBPC-TH">ALZ/FG Source</a>
      </nav>

      <div class="side-foot">
        <button id="toggleSide" class="side-btn">« ซ่อนเมนู</button>
        <div class="profile"><span class="avatar">🛡️</span><div><div class="pname">Admin</div><div class="prole">Administrator</div></div></div>
      </div>
    </aside>

    <main class="main">
      <div class="main-head" id="overview">
        <div class="head-title">
          <h2>CBPC-TH Overview</h2>
          <div class="updated" id="updatedAt">—</div>
        </div>
        <div class="head-actions">
          <span class="range-lbl">ช่วงวันที่</span>
          <select id="startPick" class="rsel"></select>
          <span class="range-lbl">ถึง</span>
          <select id="endPick" class="rsel"></select>
          <button id="refresh" class="icon-btn" title="รีเฟรช">⟳</button>
          <a class="dl-btn sm" href="#" onclick="window.print();return false;">⬇ Export PDF</a>
        </div>
      </div>

      <section class="insights" id="insights"></section>
      <div id="status"><div class="skeleton"></div><div class="skeleton"></div></div>

      <section class="kpis" id="kpis"></section>

      <section class="grid" id="trend">
        <div class="card">
          <div class="card-head">
            <h3>DAU vs CCU Trend</h3>
            <div class="legend inline">
              <span><i style="background:var(--accent)"></i> DAU</span>
              <span><i style="background:#37c6ff"></i> CCU</span>
            </div>
          </div>
          <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
        </div>
        <div class="card" id="revenue">
          <div class="metric-head">
            <div class="mh-left"><h3>Revenue Trend</h3><div class="cap">รายได้รายวัน (฿)</div></div>
            <div class="metric-idx"><span class="mi-val" id="revIdxVal" style="color:#ffce5c">—</span><span class="delta" id="revIdxDelta"></span></div>
          </div>
          <div class="chart-wrap"><canvas id="revChart"></canvas></div>
        </div>
      </section>

      <section class="row-4" id="metrics"></section>
      <section class="full" id="rev7"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>window.DASH_PRODUCT = 'CBPC-TH';</script>
  <script src="app.js?v=25"></script>
</body>
</html>
